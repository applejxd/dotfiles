description = "Claude Code のカスタムスラッシュコマンド (.md) を Gemini CLI 向け (.toml) に変換する"

prompt = """
以下は Claude Code のカスタムスラッシュコマンドファイルの内容です:

```
!{cat {{args}}}
```

このファイルを Gemini CLI のカスタムスラッシュコマンド (.toml) 形式に変換してください。

## 変換ルール

1. **ファイル形式**: YAML frontmatter + Markdown → TOML (`.toml` 拡張子)
2. **description**: YAML の `description:` → TOML の `description = "..."` (1行、省略可)
3. **prompt**: frontmatter 以下の Markdown 本文全体 → TOML の `prompt = \"\"\"...\"\"\"` (複数行文字列)
4. **シェルコマンド実行構文**: Claude の `` !`command` `` → Gemini の `!{command}` に変換
5. **引数**: `$ARGUMENTS` → `{{args}}` に変換。`{{args}}` は `!{...}` 内ではシェルエスケープされる
6. **ファイル注入**: Gemini CLI 固有の `@{path/to/file}` 構文がある。ワークスペース内のファイル内容を直接注入可能。画像・PDF 等のマルチモーダルにも対応。変換元に固定ファイル参照がある場合は `@{...}` の利用を提案すること
7. **処理順序**: `@{...}` → `!{...}` → `{{args}}` の順に処理される点に注意
8. **allowed-tools**: Gemini CLI では `~/.gemini/policies/<name>.toml` で管理する。TOML ファイル先頭にコメント (`#`) として元の allowed-tools 情報を記録し、対応する policies 設定を別途提案する

## 出力

1. 変換後の `.toml` ファイルの内容をコードブロックで提示
2. 保存先として `~/.gemini/commands/<元のファイル名>.toml` を提案
3. `allowed-tools` がある場合は、対応する Gemini CLI の policies 設定についてアドバイス
"""
