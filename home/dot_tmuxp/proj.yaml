# ~/.tmuxp/proj.yaml
session_name: proj
windows:
  - window_name: dev
    start_directory: .          # 現在のフォルダで開始
    layout: main-horizontal     # 上が大、下が横並び
    options:
      main-pane-height: 30      # 上ペインの高さ（行数）。好みで調整
    panes:
      - nvim                    # 上（大）: Vim
      - bash                    # 左下: シェル
      - uv run pytest -q || true  # 右下: pytest（失敗しても起動は続行）

