{{- /* chezmoi:modify-template */ -}}
# chezmoi-managed:start
# easy search w/o using TAB
# see https://github.com/bantya/Keypirinha-EasySearch

[engines]
# google 検索
g = Google https://www.google.com/search?q={q}
# 英語検索
d = Weblio https://ejje.weblio.jp/content/{q}

{{- if ne .chezmoi.username "applejxd" }}
# はてなブックマーク検索
h = はてブ https://b.hatena.ne.jp/applejxd/search?q={q}
{{- end }}
# chezmoi-managed:end
{{- .chezmoi.stdin | replaceAllRegex "(?s)^# chezmoi-managed:start.*?# chezmoi-managed:end(?:\\r?\\n)*" "\n\n" -}}
