snippets:
  # snippet and keyword abbrev
  - name: "[gs] git status"
    keyword: "gs,"
    snippet: git status --short --branch

  # snippet with placeholder
  - name: "[gcim] git commit message"
    keyword: "gcim,"
    snippet: git commit -m '{{commit_message}}'

  - name: "[null] null"
    keyword: "null,"
    snippet: ">/dev/null 2>&1"
    # auto expand condition
    # If not defined, it is only valid at the beginning of a line.
    context:
      # buffer: ''
      lbuffer: '.+\s'
      # rbuffer: ''

  - name: "[b] branch"
    keyword: "b,"
    snippet: git symbolic-ref --short HEAD
    context:
      lbuffer: '^git\s+checkout\s+'
    evaluate: true # eval snippet

  - name: "[kgen] ssh keygen"
    keyword: "kgen,"
    snippet: "ssh-keygen -t ed25519 -P \"\""
    context:
      lbuffer: '^ssh-keygen\s+'
    evaluate: true

  - name: "[pgen] pwgen"
    keyword: "pgen,"
    snippet: "pwgen -s -y -c -n 16"
    context:
      lbuffer: '^pwgen\s+'
    evaluate: true

completions:
  # simple sourceCommand, no callback
  - name: kill signal
    patterns:
      - "^kill -s $"
    sourceCommand: "kill -l | tr ' ' '\\n'"
    options:
      --prompt: "'Kill Signal> '"

  # use excludePatterns and callback
  - name: kill pid
    patterns:
      - "^kill( .*)? $"
    excludePatterns:
      # -l, -n or -s is followed by SIGNAL instead of PID
      - " -[lns] $"
    sourceCommand: "LANG=C ps -ef | sed 1d"
    options:
      --multi: true
      --prompt: "'Kill Process> '"
    callback: "awk '{print $2}'"
  
  - name: ssh hosts
    patterns:
      - "^ssh( .*)? $"
    sourceCommand: "cat ~/.ssh/config | grep '^Host ' | awk '{print $2}'"
    options:
      --prompt: "'SSH Host> '"

