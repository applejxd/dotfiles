# see https://tmuxp.git-pull.com/configuration/examples.html
session_name: proj
windows:
  - window_name: dev
    layout: main-horizontal # 上が大、下が横並び
    options:
      main-pane-height: 30  # 上ペインの高さ（行数）。好みで調整
    focus: true
    panes:
      - shell_command:
          - nvim .
        focus: true
      - zsh     
      - zsh
    start_directory: "${PWD}"  # 現在のフォルダで開始